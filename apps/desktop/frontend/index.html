<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarsTV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0F;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 { color: #FF6B35; font-size: 2rem; }
    p { color: #888; margin-top: 0.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div>
    <h1>MarsTV</h1>
    <p>Starting server…</p>
  </div>
  <script>
    // In dev mode, Tauri loads from devUrl (localhost:3000) automatically.
    // In production, the Next.js standalone server should be started as a
    // sidecar process before the webview loads this page.
    // For now, redirect to the dev server after a short delay.
    setTimeout(() => {
      window.location.href = 'http://localhost:3000';
    }, 1000);
  </script>
</body>
</html>
