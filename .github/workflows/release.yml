name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: macos
            os: macos-latest
            args: --bundles dmg
            artifact: '*.dmg'
          - target: linux
            os: ubuntu-latest
            args: --bundles deb,appimage
            artifact: '*.deb *.AppImage'
          - target: windows
            os: windows-latest
            args: --bundles msi
            artifact: '*.msi'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build desktop frontend (Vite)
        run: pnpm --filter @marstv/desktop build

      - name: Tauri build
        run: npx tauri build ${{ matrix.args }}
        working-directory: apps/desktop

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/${{ matrix.artifact }}
          fail_on_unmatched_files: true
          generate_release_notes: true
